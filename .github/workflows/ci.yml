name: reproduce

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration pipeline
        run: python run_pipeline.py

      - name: Verify headline results reproduce
        run: python code/verify_ci.py

      - name: Upload regenerated figures + tables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            results/figures/
            results/tables/
